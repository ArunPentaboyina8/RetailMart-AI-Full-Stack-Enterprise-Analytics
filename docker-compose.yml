# =============================================================================
# RetailMart AI Analytics Platform - Docker Compose
# =============================================================================
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f        # Follow logs
#   docker-compose down           # Stop all services
# =============================================================================

version: "3.9"

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: retailmart-db
    environment:
      POSTGRES_DB: retailmart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- FastAPI Backend + AI Agent ---
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: retailmart-backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=retailmart
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - APP_ENV=production
      - DEBUG=false
      - CHROMA_PERSIST_DIR=/app/chroma_db
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # --- Existing Dashboard (Static Files) ---
  dashboard:
    image: nginx:alpine
    container_name: retailmart-dashboard
    ports:
      - "3000:80"
    volumes:
      - ./retailmart_analytics/06_dashboard:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  chroma_data:
    driver: local
